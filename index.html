<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capstone</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      background: #eef2ff;
      color: #111827;
    }
    main {
      padding: 2rem 2.5rem;
      border-radius: 24px;
      background: #ffffff;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.1);
      max-width: 720px;
      text-align: center;
    }
    h1 { margin-bottom: 0.75rem; font-size: 2.5rem; }
    p { margin: 0.75rem 0; line-height: 1.7; }
    code { background: #f3f4f6; padding: 0.2rem 0.4rem; border-radius: 6px; }
  </style>
</head>
<body>
  <main>
    <h1>Capstone</h1>
    <p>Your GitHub Pages site is ready.</p>
    <p>Push updates to <code>main</code> and GitHub Actions will publish the site automatically.</p>
  </main>
</body>
</html>
